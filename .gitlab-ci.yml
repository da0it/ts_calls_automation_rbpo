stages:
  - sast
  - sca
  - dast
  - security_gate

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  GIT_DEPTH: "1"

sast:
  stage: sast
  image: golang:1.25-bookworm
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends python3 python3-pip ca-certificates git
    - pip3 install bandit==1.9.4
    - go install github.com/securego/gosec/v2/cmd/gosec@latest
    - export PATH="/go/bin:${PATH}"
    - mkdir -p reports/sast
  script:
    - bandit -r services scripts -x '*/grpc_gen/*,*/services/shared/proto/*,*/tests/*' -f json -o reports/sast/bandit-report.json || true
    - cd services/orchestrator && gosec -fmt=json -out=../../reports/sast/gosec-orchestrator.json -exclude-generated -exclude-dir=internal/gen ./... || true
    - cd ../ticket_creation && gosec -fmt=json -out=../../reports/sast/gosec-ticket_creation.json -exclude-generated -exclude-dir=internal/gen ./... || true
    - cd ../notification_sender && gosec -fmt=json -out=../../reports/sast/gosec-notification_sender.json -exclude-generated -exclude-dir=internal/gen ./... || true
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - reports/sast/bandit-report.json
      - reports/sast/gosec-orchestrator.json
      - reports/sast/gosec-ticket_creation.json
      - reports/sast/gosec-notification_sender.json

sca:
  stage: sca
  image: aquasec/trivy:0.70.0
  script:
    - mkdir -p reports/sca
    - trivy fs --config .trivy.yaml --scanners vuln --format cyclonedx --output reports/sca/sbom.cdx.json .
    - trivy fs --config .trivy.yaml --scanners vuln --format json --output reports/sca/trivy-report.json .
    - cp vex.json reports/sca/vex.json
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - reports/sca/sbom.cdx.json
      - reports/sca/trivy-report.json
      - reports/sca/vex.json

dast:
  stage: dast
  image: docker:27-cli
  services:
    - name: docker:27-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - mkdir -p reports/dast
    - docker network create dast-net
    - >
      docker run -d --rm --name dast-fixture --network dast-net
      -e DAST_FIXTURE_PORT=8013
      -w /workspace
      -v "$CI_PROJECT_DIR:/workspace"
      golang:1.25-bookworm
      sh -lc "cd services/orchestrator && go run ./cmd/dast_fixture"
    - |
      for i in $(seq 1 30); do
        if docker run --rm --network dast-net curlimages/curl:8.8.0 -fsS http://dast-fixture:8013/health >/dev/null; then
          break
        fi
        if [ "$i" -eq 30 ]; then
          echo "Fixture did not become ready in time"
          docker logs dast-fixture || true
          exit 1
        fi
        sleep 1
      done
    - docker run --rm --network dast-net curlimages/curl:8.8.0 -fsS http://dast-fixture:8013/api/info > reports/dast/api-info.json
    - >
      docker run --rm --network dast-net
      -v "$CI_PROJECT_DIR/reports/dast:/zap/wrk:rw"
      ghcr.io/zaproxy/zaproxy:stable
      zap-baseline.py
      -t http://dast-fixture:8013
      -j
      -m 2
      -T 5
      -I
      -J zap-report.json
      -r zap-report.html
      -x zap-report.xml || true
  after_script:
    - docker logs dast-fixture > reports/dast/dast-fixture.log 2>&1 || true
    - docker rm -f dast-fixture 2>/dev/null || true
    - docker network rm dast-net 2>/dev/null || true
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - reports/dast/api-info.json
      - reports/dast/dast-fixture.log
      - reports/dast/zap-report.json
      - reports/dast/zap-report.html
      - reports/dast/zap-report.xml

security_gate:
  stage: security_gate
  image: python:3.12-slim
  needs:
    - job: sast
      artifacts: true
    - job: sca
      artifacts: true
    - job: dast
      artifacts: true
  dependencies:
    - sast
    - sca
    - dast
  script:
    - sh scripts/run_security_gate_all.sh
