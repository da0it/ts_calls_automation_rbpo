<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="840" viewBox="0 0 1200 840" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="1200" height="840" fill="#f8f9fa"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2980b9"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e67e22"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8e44ad"/>
    </marker>
  </defs>

  <!-- Title block -->
  <rect x="20" y="20" width="1160" height="50" fill="#2c3e50" rx="4"/>
  <text x="600" y="52" text-anchor="middle" font-size="20" font-weight="bold" fill="white">IDEF0 | A-0 | Автоматизация обработки звонков</text>

  <!-- Node number -->
  <rect x="20" y="780" width="120" height="40" fill="#2c3e50" rx="4"/>
  <text x="80" y="806" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Узел: A-0</text>

  <!-- Main function box -->
  <rect x="380" y="280" width="440" height="200" fill="white" stroke="#2c3e50" stroke-width="3" rx="6"/>
  <text x="600" y="355" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">ОБРАБОТАТЬ</text>
  <text x="600" y="380" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">ТЕЛЕФОННЫЙ ЗВОНОК</text>
  <text x="600" y="415" text-anchor="middle" font-size="13" fill="#7f8c8d">Транскрибировать, классифицировать,</text>
  <text x="600" y="435" text-anchor="middle" font-size="13" fill="#7f8c8d">извлечь сущности, создать тикет,</text>
  <text x="600" y="455" text-anchor="middle" font-size="13" fill="#7f8c8d">уведомить ответственных</text>
  <text x="760" y="492" text-anchor="end" font-size="11" fill="#95a5a6" font-style="italic">A0</text>

  <!-- ===== INPUTS (left) ===== -->
  <!-- I1: Audio file -->
  <line x1="100" y1="320" x2="380" y2="340" stroke="#27ae60" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <rect x="20" y="295" width="170" height="50" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5" rx="4"/>
  <text x="105" y="316" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e8449">Аудиозапись звонка</text>
  <text x="105" y="333" text-anchor="middle" font-size="11" fill="#27ae60">(MP3 / WAV)</text>
  <text x="105" y="350" text-anchor="middle" font-size="10" fill="#95a5a6">I1</text>

  <!-- I2: Call metadata -->
  <line x1="100" y1="410" x2="380" y2="390" stroke="#27ae60" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <rect x="20" y="385" width="170" height="50" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5" rx="4"/>
  <text x="105" y="406" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e8449">Метаданные звонка</text>
  <text x="105" y="423" text-anchor="middle" font-size="11" fill="#27ae60">(call_id, дата, агент)</text>
  <text x="105" y="440" text-anchor="middle" font-size="10" fill="#95a5a6">I2</text>

  <!-- ===== OUTPUTS (right) ===== -->
  <!-- O1: Ticket -->
  <line x1="820" y1="340" x2="1060" y2="320" stroke="#2980b9" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <rect x="1060" y="295" width="120" height="50" fill="#ebf5fb" stroke="#2980b9" stroke-width="1.5" rx="4"/>
  <text x="1120" y="316" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a5276">Тикет в</text>
  <text x="1120" y="333" text-anchor="middle" font-size="11" fill="#2980b9">системе поддержки</text>
  <text x="1120" y="350" text-anchor="middle" font-size="10" fill="#95a5a6">O1</text>

  <!-- O2: Notification -->
  <line x1="820" y1="390" x2="1060" y2="390" stroke="#2980b9" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <rect x="1060" y="365" width="120" height="50" fill="#ebf5fb" stroke="#2980b9" stroke-width="1.5" rx="4"/>
  <text x="1120" y="386" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a5276">Уведомление</text>
  <text x="1120" y="403" text-anchor="middle" font-size="11" fill="#2980b9">ответственным</text>
  <text x="1120" y="420" text-anchor="middle" font-size="10" fill="#95a5a6">O2</text>

  <!-- O3: Report -->
  <line x1="820" y1="440" x2="1060" y2="460" stroke="#2980b9" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <rect x="1060" y="435" width="120" height="50" fill="#ebf5fb" stroke="#2980b9" stroke-width="1.5" rx="4"/>
  <text x="1120" y="456" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a5276">Отчёт об</text>
  <text x="1120" y="473" text-anchor="middle" font-size="11" fill="#2980b9">обработке звонка</text>
  <text x="1120" y="490" text-anchor="middle" font-size="10" fill="#95a5a6">O3</text>

  <!-- ===== CONTROLS (top) ===== -->
  <!-- C1: Routing rules -->
  <line x1="480" y1="160" x2="480" y2="280" stroke="#e67e22" stroke-width="2.5" marker-end="url(#arrow-orange)"/>
  <rect x="390" y="110" width="180" height="50" fill="#fef9e7" stroke="#e67e22" stroke-width="1.5" rx="4"/>
  <text x="480" y="131" text-anchor="middle" font-size="12" font-weight="bold" fill="#9a6a0a">Правила маршрутизации</text>
  <text x="480" y="148" text-anchor="middle" font-size="11" fill="#e67e22">(intents.json, groups.json)</text>
  <text x="480" y="165" text-anchor="middle" font-size="10" fill="#95a5a6">C1</text>

  <!-- C2: Auth / Security -->
  <line x1="660" y1="160" x2="660" y2="280" stroke="#e67e22" stroke-width="2.5" marker-end="url(#arrow-orange)"/>
  <rect x="570" y="110" width="180" height="50" fill="#fef9e7" stroke="#e67e22" stroke-width="1.5" rx="4"/>
  <text x="660" y="131" text-anchor="middle" font-size="12" font-weight="bold" fill="#9a6a0a">Политика безопасности</text>
  <text x="660" y="148" text-anchor="middle" font-size="11" fill="#e67e22">(JWT, роли: admin/operator)</text>
  <text x="660" y="165" text-anchor="middle" font-size="10" fill="#95a5a6">C2</text>

  <!-- ===== MECHANISMS (bottom) ===== -->
  <!-- M1: gRPC + REST API infrastructure -->
  <line x1="490" y1="620" x2="490" y2="480" stroke="#8e44ad" stroke-width="2.5" marker-end="url(#arrow-purple)"/>
  <rect x="385" y="620" width="210" height="55" fill="#f5eef8" stroke="#8e44ad" stroke-width="1.5" rx="4"/>
  <text x="490" y="641" text-anchor="middle" font-size="12" font-weight="bold" fill="#6c3483">gRPC / REST API</text>
  <text x="490" y="658" text-anchor="middle" font-size="11" fill="#8e44ad">Протобуфы, межсервисная</text>
  <text x="490" y="672" text-anchor="middle" font-size="11" fill="#8e44ad">и внешняя коммуникация</text>
  <text x="490" y="687" text-anchor="middle" font-size="10" fill="#95a5a6">M1</text>

  <!-- M2: PostgreSQL -->
  <line x1="710" y1="620" x2="710" y2="480" stroke="#8e44ad" stroke-width="2.5" marker-end="url(#arrow-purple)"/>
  <rect x="610" y="620" width="200" height="55" fill="#f5eef8" stroke="#8e44ad" stroke-width="1.5" rx="4"/>
  <text x="710" y="641" text-anchor="middle" font-size="12" font-weight="bold" fill="#6c3483">PostgreSQL</text>
  <text x="710" y="658" text-anchor="middle" font-size="11" fill="#8e44ad">Хранение данных</text>
  <text x="710" y="672" text-anchor="middle" font-size="11" fill="#8e44ad">(on-premise)</text>
  <text x="710" y="687" text-anchor="middle" font-size="10" fill="#95a5a6">M2</text>

  <!-- M3: Local ML models -->
  <line x1="600" y1="740" x2="600" y2="480" stroke="#8e44ad" stroke-width="2.5" marker-end="url(#arrow-purple)"/>
  <rect x="455" y="740" width="290" height="55" fill="#f5eef8" stroke="#8e44ad" stroke-width="1.5" rx="4"/>
  <text x="600" y="761" text-anchor="middle" font-size="12" font-weight="bold" fill="#6c3483">Локальные ML-модели</text>
  <text x="600" y="778" text-anchor="middle" font-size="11" fill="#8e44ad">WhisperX, ruBERT, DeepPavlov,</text>
  <text x="600" y="792" text-anchor="middle" font-size="11" fill="#8e44ad">локальная LLM (on-premise)</text>
  <text x="600" y="807" text-anchor="middle" font-size="10" fill="#95a5a6">M3</text>

  <!-- Legend -->
  <rect x="20" y="620" width="300" height="140" fill="white" stroke="#bdc3c7" stroke-width="1.5" rx="4"/>
  <text x="30" y="643" font-size="13" font-weight="bold" fill="#2c3e50">Условные обозначения:</text>
  <line x1="30" y1="665" x2="70" y2="665" stroke="#27ae60" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <text x="78" y="670" font-size="12" fill="#2c3e50">Входы (Inputs)</text>
  <line x1="30" y1="690" x2="70" y2="690" stroke="#2980b9" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="78" y="695" font-size="12" fill="#2c3e50">Выходы (Outputs)</text>
  <line x1="30" y1="715" x2="70" y2="715" stroke="#e67e22" stroke-width="2.5" marker-end="url(#arrow-orange)"/>
  <text x="78" y="720" font-size="12" fill="#2c3e50">Управление (Controls)</text>
  <line x1="30" y1="740" x2="70" y2="740" stroke="#8e44ad" stroke-width="2.5" marker-end="url(#arrow-purple)"/>
  <text x="78" y="745" font-size="12" fill="#2c3e50">Механизмы (Mechanisms)</text>

</svg>
