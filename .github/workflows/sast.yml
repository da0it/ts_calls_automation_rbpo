name: SAST

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  sast:
    name: SAST Reports
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Install Bandit and gosec
        run: |
          python -m pip install bandit==1.9.4
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Create reports directory
        run: mkdir -p reports/sast

      - name: Run Bandit
        run: |
          bandit -r services scripts \
            -x "*/grpc_gen/*,*/services/shared/proto/*,*/tests/*" \
            -f json \
            -o reports/sast/bandit-report.json || true

      - name: Run gosec for orchestrator
        working-directory: services/orchestrator
        run: |
          gosec -fmt=json \
            -out=../../reports/sast/gosec-orchestrator.json \
            -exclude-generated \
            -exclude-dir=internal/gen \
            ./... || true

      - name: Run gosec for ticket_creation
        working-directory: services/ticket_creation
        run: |
          gosec -fmt=json \
            -out=../../reports/sast/gosec-ticket_creation.json \
            -exclude-generated \
            -exclude-dir=internal/gen \
            ./... || true

      - name: Run gosec for notification_sender
        working-directory: services/notification_sender
        run: |
          gosec -fmt=json \
            -out=../../reports/sast/gosec-notification_sender.json \
            -exclude-generated \
            -exclude-dir=internal/gen \
            ./... || true

      - name: Upload SAST reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-reports
          path: reports/sast/
          retention-days: 7

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: sast

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download SAST reports
        uses: actions/download-artifact@v4
        with:
          name: sast-reports
          path: reports/sast

      - name: Run Security Gate
        run: |
          python security_gate.py \
            --threshold high \
            --bandit reports/sast/bandit-report.json \
            --gosec reports/sast/gosec-orchestrator.json \
            --gosec reports/sast/gosec-ticket_creation.json \
            --gosec reports/sast/gosec-notification_sender.json
