name: DAST

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dast:
    name: DAST Reports
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/orchestrator/go.mod

      - name: Create reports directory
        run: mkdir -p reports/dast

      - name: Build lightweight DAST fixture
        working-directory: services/orchestrator
        run: go build -o "$RUNNER_TEMP/dast-fixture" ./cmd/dast_fixture

      - name: Start lightweight DAST fixture
        run: |
          nohup "$RUNNER_TEMP/dast-fixture" > "$GITHUB_WORKSPACE/reports/dast/dast-fixture.log" 2>&1 &
          echo $! > "$GITHUB_WORKSPACE/reports/dast/dast-fixture.pid"

      - name: Wait for fixture
        run: |
          for _ in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:8013/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Fixture did not become ready in time"
          cat reports/dast/dast-fixture.log || true
          exit 1

      - name: Save API snapshot
        run: curl -fsS http://127.0.0.1:8013/api/info > reports/dast/api-info.json

      - name: Run OWASP ZAP baseline scan
        run: |
          chmod -R 777 reports/dast
          set +e
          docker run --rm --network host --user 0:0 \
            -v "$PWD/reports/dast:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://127.0.0.1:8013 \
            -j \
            -m 2 \
            -T 5 \
            -I \
            -J zap-report.json \
            -r zap-report.html \
            -x zap-report.xml \
            2>&1 | tee reports/dast/zap-console.log
          echo "ZAP exit code: ${PIPESTATUS[0]}" | tee -a reports/dast/zap-console.log
          exit 0

      - name: Verify ZAP reports
        run: |
          ls -lah reports/dast
          if [ ! -f reports/dast/zap-report.json ]; then
            echo "zap-report.json was not generated"
            echo "=== dast-fixture.log ==="
            sed -n '1,240p' reports/dast/dast-fixture.log || true
            echo "=== zap-console.log ==="
            sed -n '1,240p' reports/dast/zap-console.log || true
            exit 1
          fi
          test -f reports/dast/zap-report.json
          test -f reports/dast/zap-report.html
          test -f reports/dast/zap-report.xml

      - name: Upload DAST artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-reports
          path: reports/dast/
          retention-days: 7

      - name: Stop fixture
        if: always()
        run: |
          if [ -f reports/dast/dast-fixture.pid ]; then
            kill "$(cat reports/dast/dast-fixture.pid)" 2>/dev/null || true
          fi

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: dast

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download DAST artifacts
        uses: actions/download-artifact@v4
        with:
          name: dast-reports
          path: reports/dast

      - name: Run DAST Security Gate
        run: |
          python security_gate.py \
            --threshold high \
            --policy dast_policy.yaml \
            --zap reports/dast/zap-report.json
