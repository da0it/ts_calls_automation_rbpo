name: SCA

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sca:
    name: SCA Reports
    runs-on: ubuntu-latest
    container:
      image: aquasec/trivy:0.70.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create reports directory
        run: mkdir -p reports/sca

      - name: Generate SBOM
        run: trivy fs --config .trivy.yaml --scanners vuln --format cyclonedx --output reports/sca/sbom.cdx.json .

      - name: Scan dependencies with Trivy
        run: trivy fs --config .trivy.yaml --scanners vuln --format json --output reports/sca/trivy-report.json .

      - name: Copy VEX document
        run: cp vex.json reports/sca/vex.json

      - name: Upload SCA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sca-reports
          path: reports/sca/
          retention-days: 7

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: sca

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download SCA artifacts
        uses: actions/download-artifact@v4
        with:
          name: sca-reports
          path: reports/sca

      - name: Run Security Gate
        run: |
          python security_gate.py \
            --threshold critical \
            --policy security_policy.yaml \
            --trivy reports/sca/trivy-report.json
