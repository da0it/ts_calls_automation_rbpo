name: DevSecOps CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  sast:
    name: SAST Reports
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Install Bandit and gosec
        run: |
          python -m pip install bandit==1.9.4
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Create reports directory
        run: mkdir -p reports/sast

      - name: Run Bandit
        run: |
          bandit -r services scripts \
            -x "*/grpc_gen/*,*/services/shared/proto/*,*/tests/*" \
            -f json \
            -o reports/sast/bandit-report.json || true

      - name: Run gosec for orchestrator
        working-directory: services/orchestrator
        run: |
          gosec -fmt=json \
            -out=../../reports/sast/gosec-orchestrator.json \
            -exclude-generated \
            -exclude-dir=internal/gen \
            ./... || true

      - name: Run gosec for ticket_creation
        working-directory: services/ticket_creation
        run: |
          gosec -fmt=json \
            -out=../../reports/sast/gosec-ticket_creation.json \
            -exclude-generated \
            -exclude-dir=internal/gen \
            ./... || true

      - name: Run gosec for notification_sender
        working-directory: services/notification_sender
        run: |
          gosec -fmt=json \
            -out=../../reports/sast/gosec-notification_sender.json \
            -exclude-generated \
            -exclude-dir=internal/gen \
            ./... || true

      - name: Upload SAST reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-reports
          path: reports/sast/
          retention-days: 7

  sca:
    name: SCA Reports
    runs-on: ubuntu-latest
    container:
      image: aquasec/trivy:0.70.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create reports directory
        run: mkdir -p reports/sca

      - name: Generate SBOM
        run: trivy fs --config .trivy.yaml --scanners vuln --format cyclonedx --output reports/sca/sbom.cdx.json .

      - name: Scan dependencies with Trivy
        run: trivy fs --config .trivy.yaml --scanners vuln --format json --output reports/sca/trivy-report.json .

      - name: Copy VEX document
        run: cp vex.json reports/sca/vex.json

      - name: Upload SCA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sca-reports
          path: reports/sca/
          retention-days: 7

  dast:
    name: DAST Reports
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/orchestrator/go.mod

      - name: Create reports directory
        run: mkdir -p reports/dast

      - name: Start lightweight DAST fixture
        working-directory: services/orchestrator
        run: |
          go run ./cmd/dast_fixture > "$GITHUB_WORKSPACE/reports/dast/dast-fixture.log" 2>&1 &
          echo $! > "$GITHUB_WORKSPACE/reports/dast/dast-fixture.pid"

      - name: Wait for fixture
        run: |
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8013/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Fixture did not become ready in time"
          cat reports/dast/dast-fixture.log || true
          exit 1

      - name: Save API snapshot
        run: curl -fsS http://127.0.0.1:8013/api/info > reports/dast/api-info.json

      - name: Run OWASP ZAP baseline scan
        run: |
          docker run --rm --network host \
            -v "$PWD/reports/dast:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://127.0.0.1:8013 \
            -j \
            -m 2 \
            -T 5 \
            -I \
            -J zap-report.json \
            -r zap-report.html \
            -x zap-report.xml || true

      - name: Upload DAST artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-reports
          path: reports/dast/
          retention-days: 7

      - name: Stop fixture
        if: always()
        run: |
          if [ -f reports/dast/dast-fixture.pid ]; then
            kill "$(cat reports/dast/dast-fixture.pid)" 2>/dev/null || true
          fi

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs:
      - sast
      - sca
      - dast

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download SAST reports
        uses: actions/download-artifact@v4
        with:
          name: sast-reports
          path: reports/sast

      - name: Download SCA artifacts
        uses: actions/download-artifact@v4
        with:
          name: sca-reports
          path: reports/sca

      - name: Download DAST artifacts
        uses: actions/download-artifact@v4
        with:
          name: dast-reports
          path: reports/dast

      - name: Run Security Gate
        run: sh scripts/run_security_gate_all.sh
